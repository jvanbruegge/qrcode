<!DOCTYPE html>
<html>
<head>
  <title>QR-code generator</title>
</head>
<body>
  <textarea id="codes" rows="25" style="width: calc(100% - 16px);">https://your-url-here.com
https://more-urls-here.com</textarea>
  <button id="generate">
    Generate
  </button>
  <script type="module">
    import { renderSVG } from './uqr.mjs';
    import { Zip, ZipPassThrough, strToU8 } from './fflate.mjs';

    document.querySelector('#generate').addEventListener('click', () => {
      go();
    });

    async function go() {
      const codes = document.querySelector('#codes').value.split(/\s/);

      let chunks = [];
      const zip = new Zip((err, dat, final) => {
        if(!err) {
          chunks.push(dat);
          if (final) {
            const a = document.createElement('a');
            const blob = new Blob(chunks, { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = "qrcodes.zip";
            a.click() 
          }
        } else {
          alert(err);
        };
      });

      const a = document.createElement('a');
      let res = new Array(codes.length);
      for(let i = 0; i < codes.length; i++) {
        const svg = renderSVG(codes[i], {
          ecc: 'L'
        });

        const canvas = await svgToCanvas(svg, 300, 300);
        const dataUrl = canvas.toDataURL('image/png');

        const file = new ZipPassThrough('qr' + (i+1) + '.png');
        zip.add(file);
        file.push(decodeBase64ToBinary(parseDataURL(dataUrl).data), true);
      }

      zip.end();
    };

    async function svgToCanvas(svgContent, width, height) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas);
        };
        img.onerror = () => reject(new Error('SVG load failed'));
 
        // Encode SVG as a Blob URL (avoids base64 bloat for large SVGs)
        const svgBlob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
        const svgUrl = URL.createObjectURL(svgBlob);
        img.src = svgUrl;
      });
    }

    function parseDataURL(dataURL) {
      const [header, data] = dataURL.split(',');
      const mimeType = header.match(/:(.*?);/)[1];

      return { mimeType, data };
    }

    function decodeBase64ToBinary(base64Data) {
      const decodedString = atob(base64Data);
      const binaryData = new Uint8Array(decodedString.length);
      for (let i = 0; i < decodedString.length; i++) {
        binaryData[i] = decodedString.charCodeAt(i);
      }
      return binaryData;
    }
  </script>
</body>
</html>
