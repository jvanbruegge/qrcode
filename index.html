<!DOCTYPE html>
<html>
<head>
  <title>QR-code generator</title>
</head>
<body>
  <textarea id="codes" rows="25" style="width: calc(100% - 16px);">https://your-url-here.com
https://more-urls-here.com</textarea>
  <button id="generate">
    Generate
  </button>
  <script type="module">
    import { renderSVG } from './uqr.mjs';
    import { zipSync, strToU8 } from './fflate.mjs';

    document.querySelector('#generate').addEventListener('click', () => {
      go();
    });

    async function go() {
      const codes = document.querySelector('#codes').value.split(/\s/);

      const a = document.createElement('a');
      let res = new Array(codes.length);
      for(let i = 0; i < codes.length; i++) {
        const svg = renderSVG(codes[i], {
          ecc: 'L'
        });

        const canvas = await svgToCanvas(svg, 300, 300);
        const dataUrl = canvas.toDataURL('image/png');

        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = "qr" + (i+1) + ".png";
        a.click();
      }
    };

    async function svgToCanvas(svgContent, width, height) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas);
        };
        img.onerror = () => reject(new Error('SVG load failed'));
 
        // Encode SVG as a Blob URL (avoids base64 bloat for large SVGs)
        const svgBlob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
        const svgUrl = URL.createObjectURL(svgBlob);
        img.src = svgUrl;
      });
    }
  </script>
</body>
</html>
